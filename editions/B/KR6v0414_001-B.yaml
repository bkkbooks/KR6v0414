衍或當作有字問佛性與煩惱既俱何故獨斷煩惱非本答譬如金之與鑛俱時而生得遇金師鑪冶烹鍊金之與鑛當各自別金則百鍊百精鑛若再鍊變成灰土涅槃經云金者喻於法性胡本與石井本皆作佛性鑛者喻於煩惱諸大乘經論具明煩惱為客塵所以不得稱之為本若以煩惱為本煩惱為是暗如何得明涅槃經云只言以明破暗不言以暗得明若暗破明即應經論自共傳經論既無此法從何而立若以煩惱為本若將煩惱為本胡本無此六字石井本有不應斷煩惱而求涅槃問何故經云不斷煩惱而入涅槃答計煩惱性本自無斷石井本此八字屬於問話此下始有答字而無若字倫敦此本此八字也連屬問話此下有墨塗去的一個字似若也似艸頭的答字胡本此八字作若煩惱本自無斷七字而下文明有若字故胡適校改上若字為答字今參校三本我決定校增答字而以此八字屬答話若指煩惱性即是涅槃不應勸眾生具修六波羅蜜斷一切惡修一切善以煩惱為本即是棄本逐末原無棄字作涅字又點去石井本也脫一字鈴木校補棄字胡本此句作若以煩惱為本不應棄本逐末此是通人臆改的了涅槃經云一切眾生本來涅槃無漏智性本自具足譬如木性火性俱時而生值燧人鑽搖火之與木當時各自經云木者喻若煩惱火者喻如佛性涅槃經云以智火燒煩惱薪經云智慧即佛性原脫此十四字石井本亦脫依胡本校補火上似應有慧字具有此文明知煩惱非本問曰何故涅槃經云第十五梵行品說本有者本有煩惱今無者今無大般涅槃本無者本無摩訶般若今有者今有煩惱答為對五蔭色身故所以說煩惱為本又經云佛言善男子為化度眾生故而作是說亦為聲聞辟支佛而作是說又第卅六憍陳如品梵志問佛身與煩惱何者於先佛言身在先亦不可煩惱在先亦不可要於煩惱然始有身驗此經文故知煩惱與身為本非謂對佛性也又經云有佛性故得稱為常以常故得稱為本非是本無今有第十五卷云佛性者無得無生何以故非色非不色不長不短不高不下不生不滅故以不生滅故得稱為常以常故得稱為本第十九卷云如暗室中有七寶人亦知有此本與石井本此四字作人亦不知所依經文改正為暗故不見有智之人然大明燈持往照燎悉得見之是人見此七寶終不言今有此本與石井本皆無不字胡本有法性亦非今始有以煩惱暗故不見謂言本無今有亦如盲人不見日月得值良醫療之即便得見謂言日月本無今有以盲故不見日月本自有之第廿五卷云一切眾生未來之世定得阿耨多羅三藐三菩提是名佛性一切眾生現在具有煩惱諸結是故不見謂言本無又第十九卷云有佛無佛性相常住以諸眾生煩惱覆故不見涅槃便謂為無當知涅槃是常住法非本無今有佛性者非蔭界入非本無今有非已有還無從眾善緣眾生得見佛性以得見佛性故當知本自有之問既言本自有之何不自見要藉因緣答猶如地下有水若不施功掘鑿終不能得亦如摩尼之寶若不磨治終不明淨以不明淨故謂言非寶涅槃經云一切眾生不因諸佛菩薩善知識指授終不能得若自見者無有是處以不見故謂言本無佛性佛性者非本無今有也真法師問云何是常義答無常是常義問今問常義何故答無常是常義答因有無常而始說常若無無常亦無常義以是義故得稱為常譬如長因短生短因長立若其無長短亦不立事既同故義亦何殊此本與石井本皆作事既故胡本作事相因故今校增同字似勝於因字又法性體不可得是常義又虛空亦是常義問何故虛空是常義此本與石井本均脫此八字依胡本補答虛空無大小亦無中邊是故稱為常義虛空下此本與石井本皆有以字胡本無謂法性體不可得是不有能見不可得體湛然常寂是不無是為常義若準有無而論則如是若約法性體中於無亦不無於有亦不有恒沙功德本自其足此是常義以上所補的脫文皆依胡本補石井本脫文與此本同又不大不小是常義謂虛空無大不可言其大虛空無小不可言其小今言大者小家之大今言其小者乃是大家之小此於未了人則以常無常而論若約法性理三本皆作理似當作體亦無常亦無無常以無無常故得稱為常戶部尚書王趙公以偈問三車義宅中無三車露地唯得一不知何所用而說此三車答曰三車在門外說即在宅中諸子聞說時已得三車訖又問今者在門外先是乘車出宅中既得車出外何須索答諸子雖得訖不知車是車既不自證知所以門外索問何處有人得道果豈不自知乎答下文自證所得功德仍不自覺知問諸子不自知容可門外索父應知子得何須更與車答諸子不自知所以門外索長者今與車還是先與者問三車本無實所說乃權宜與者是舊車那應得假物答長者意在一方便權說三前者說三車三車本是一問一車能作三三車能作一何不元說一辛苦說三車答若為迷人說三便作三車若約悟人解即三便是一崔齊公問禪師坐禪一定以後得幾時出定答曰神無方所有何定乎又問既言無定何名用心答曰我今定尚不立誰道用心問心定俱無若為得道若為那麼柳宗元詩若為化得身千億散上峰頭望故鄉答曰道只沒道亦無若為道只沒這麼問既無若為道何處得只沒道答今言只沒道為有若為道若言無若為只沒亦不存廬山簡法師問何者是中道義石井本也脫簡字依胡本補答曰邊義即是問今問中道義何故答邊義是答曰今言中道者要因邊義立若其不立邊中道亦不立禮部侍郎蘇晉問何者是大乘何者是最上乘答菩薩即大乘佛即最上乘問曰大乘最上乘有何差別答曰言大乘者如菩薩行檀波羅密觀三事體空乃至六波羅蜜亦復如是六胡本作五石井本作六故名大乘最上乘者但見本自性空寂即知三事本來自性空更不復起觀乃至六度亦然六度即六波羅蜜此本與石井本作亦度胡本作六塵是名最上乘又問假緣起否答曰此中不立緣起問若無緣起云何得知答本空寂體上自有般若智能知不假緣起若立緣起即有次第問然則更不假修一切行耶答若得如此見者萬行俱備胡本有此問答此本與石井本俱脫又問見此性人若起無明成業結否答雖有無明不成業結問何得不成答但見本性體不可得即業結本自不生潤州刺史李峻胡本無此六字故此章誤連上章為一章此本與石井本有六字曰見有一山僧禮拜嵩山安禪師師言趁粥道人又一授記寺僧禮拜安禪師師言惜粥道人此本與石井本皆作措粥道人今從胡本問此二若為答此二俱遣問作沒生遣答但離即遣問作沒生離答我今只沒離無作沒生離問為復心離為是眼離答今只沒離亦無心眼離問心眼俱不見應是盲人答自是盲者唱盲他家見者自不盲經云是盲者過非日月過張燕公問禪師日常說無念法勸人修學未審無念法有無答曰無念法不言有不言無問何故無念不言有無答若言其有者即不同世有若言其無者即不同世無是以無念不同有無石井本同胡本作言其有者即同世有言其無者即同世無是以無念不同有無此可見胡本的底本是曾經一位通人改削過的本子改不同為同意義似勝問喚作是沒勿胡本作喚作是物答不喚作是勿胡本作不喚作是物問作勿生是此本與石井本作異沒時作物生今用胡本答亦不作勿生此本與石井本作亦不作一物今用胡本作勿生怎麼生是以無念不可說今言說者為對問故若不對問終無言說譬如明鏡若不對像鏡中終不現像今言現像者為對物故所以現像問若不對像照不照此七字胡本作不對像照四字疑原作不對像照不答今言照者不言對與不對俱常照問既無形像復無言說一切有無皆不可立今言照者復是何照答今言照者以鏡明故有自性照以眾生心淨故自然有大智慧光照無餘世界有自性照胡本作有此性以眾生心淨故此本與石井本皆作以若以眾生心淨胡本不誤今參酌三本校正可讀問既如此作沒生時得答但見無問既無見是物是物甚麼答雖見不喚作是物問既不喚作是物何名為見答見無物即是真見常見和上即神會和尚問遠法師即菩提達摩南宗定是非論裏面唱配角的崇遠法師言曾講大般涅槃經不遠法師言講大般涅槃經數十遍和上又言一切大小乘經論說眾生不解脫者為緣有生滅二心涅槃經云諸行無常是生滅法生滅滅已寂滅為樂未審生之與滅可滅不可滅為是將生滅滅為是將滅滅生為是生能自滅生為是滅能自滅滅請法師一一具答此節文字此本與石井本相同皆錯誤不可讀用巴黎號卷子校正遠法師言亦見諸經論作如此說見字上此本衍不字石井本與皆無至於此義實不能了禪師若了此義請為眾說和上言不辭為說恐無解者法師言道俗有一萬餘人可無一人能解和上言看見不見法師言見是沒和上言果然不見法師既得此語結舌無對非論一己屈詞抑亦諸徒失志勝負既分道俗嗟散上和問澄禪師修何法而得見性澄禪師答曰先須學坐修定得定已後因定發慧以智慧故即得見性用石井本及胡本補三字問曰修定之時豈不要須作意不答言是問既是作意即是識定若為得見性答今言見性者要須修定若不修定若為見性問曰今修定者元是妄心妄心修定如何得定答曰今修定得定者自有內外照以內外照故得見淨以心淨故即是見性問曰今言見性者性無內外若言因內外照故元是妄心苦為見性經云若學諸三昧是動非坐禪三昧即禪定心隨境界流云何名為定若指此定為是者維摩詰即不應訶舍利弗宴坐也和上問諸學道者今言用心者為是作意不作意若不作意即是聾俗無別若言作意即是有所得有所得者即是繫縛何由可得解脫聲聞修空住空即被空縛修定住定即被定縛修靜住靜即被靜縛修寂住寂即被寂縛是故般若經云若取法相即著我人眾生壽者維摩經云調伏心者是聲聞法不調伏心者是愚人法仁者用心是調伏何名解脫須陁洹亦調伏斯陁含亦調伏阿那含阿羅漢亦調伏非想定及非非想定亦調伏四禪亦調伏四聖三賢並皆調伏若為鑒別若如此定者並未是真解脫法神足師問真如之體以是本心復無青黃之相如何可識答我心本空寂不覺妄念起若覺妄念者覺妄自俱滅此即識心者也三個妄字此本與石井本皆作忘胡本作妄胡本無也字問雖有覺照還同生滅今說何法得不生滅答只由心起故遂有生滅若也起心既滅即生滅自除無相可得假說覺照覺照既滅生滅自無即不生滅崇遠法師問云何為空若道有空還同質礙若說無空即何所歸依答曰只為未見性是以說空若見本性空亦不有如此見者是名歸依和上告諸知識若欲得了達甚深法界直入一行三昧者先須誦詩金剛般若波羅蜜經修學般若波羅蜜金剛般若波羅蜜經云須菩提若人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者誦持此經為人演說其福勝彼云何為人演說不取於相云何不取於相所謂如如云何如如所謂無念云何無念所謂不念有無不念善惡不念有邊際無邊際不念有限量無限量不念菩提不以菩提為念不念湼槃不以湼槃的念是為無念是無念者即是般若波羅蜜般若波羅蜜者即是一行三昧三神會和尚的五更轉曲子巴黎國家圖書館藏的長卷上有四個文件第一是菩提達摩南宗定是非論第二是南陽和上頓教解脫禪門直了性壇語第三是南宗定邪正五更轉曲子第四是一首五言律詩前年我寫定南陽和上壇語史語所集刊二十九本八二七八三六頁的時候曾把