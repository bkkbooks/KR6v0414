body:
  text: 目次一神會語錄的三個本子的比勘二南陽和尚問答雜徵義劉澄集三神會和尚的五更轉曲子一荷澤寺神會和尚五更轉兩首二五更轉一首三五更轉兩本四大乘五更轉五南宗定邪正五更轉六北平圖書館的兩個敦煌本七校寫五更轉後記註附倫敦大英博物院藏的荷澤和尚五更轉及南陽和尚問答雜義敦煌寫本照片一神會語錄的三個本子的比勘我在歷史語言研究所集刊廿九本頁八七六曾指出神會的語錄現已出現的有兩本都是敦煌出來的甲胡適校寫巴黎國家圖書館藏的敦煌寫本原編號收在神會和尚遺集卷一民國十九年一九三出版原無題目胡適擬題神會語錄乙日本石井光雄影印他購藏的敦煌寫本昭和七年民國廿一年一九三二影印二百部原無題目卷前有題字一行云此文字欠頭後有博覽道人尋本續之矣影印本題燉煌出土神會錄附有燉煌出土神會錄解說一小冊鈴木貞太郎撰鈴木貞太郎公田連太郎校訂石井光雄本昭和九年民國廿三年一九三四排印出版題作燉煌出土荷澤神會禪師語錄那個胡適校寫本以下省稱胡本那個石井光雄影印本以下省稱石井本鈴木公田校訂本以下省稱鈴木校石井本那兩個本子都欠頭都沒有題目所以我和鈴木先生都只題作神會語錄去年民國四十八年一九五九四月日本京都大學人文科學研究所的入矢義高先生寫信給我報告他在前兩年一九五七發見了這個神會語錄第三本並且發見了神會語錄原題作南陽和尚問答雜徵義原編集的人是劉澄入矢義高先生的原信我摘鈔一段近日讀到先生發表在集刊廿九本的大作新校定的敦煌寫本神會和尚兩種校定精審整理醒目真是不勝佩服敝研究所在一九五六年由大英博物館購到該館所藏敦煌寫本的全部我們就組織了共同調查的一個研究班一直到現在將那全部寫本翻覆審核前後已有三次了一九五七年我檢到的時候就發現了這也是一部神會語錄遽取石井本比對一過知其內容和文章頗近石井本惜尾部斷殘只有石井本的三分之一不過最寶貴的是載在卷首的編者劉澄的一篇序據這篇序我們知道這一部語錄的原名是問答雜徵義今按日本僧圓仁入唐新求聖教目錄有南陽和尚問答雜義一卷劉澄集的記錄與此序合今迻錄此序用供先生的參考那時我因外科手術住在臺灣大學醫學院的醫院裏我收到了入矢先生的信十分高興就回了一封信說卷子的發現不但給神會語錄添了一個可以資校勘的第三本並且確定了這部語錄的編輯人與原來的標題這是一舉而三得的貢獻我們研究神會的人對先生都應該表示敬佩與感謝大英博物館所藏敦煌寫本的全部前承貴研究所的厚意敝院歷史語言研究所也購得了全部副本我出醫院後當即檢查一校即是原編的號斯坦因一八六二一九四三一九七年在敦煌千佛洞取去中古寫本大小八千多件其中有二十件是最古的雕刻印本全存貯在倫敦大英博物館這些文件都用編號正如巴黎國家圖書館藏的敦煌文件都用伯希和編號大英博物館的翟理斯先生費了二十多年的精力才把這大大小小八千多件敦煌文卷整理完畢編了一部大英博物館藏的敦煌出來的中國寫本分類記注目錄一九五七年出版這本目錄分五大類第一佛教典籍第二道教典籍第三摩尼教典籍第四俗家文件第五雕印文件第一類最多共編六千七百九十四號故又分十四子目其中第一子目為大藏經翟氏用南條文雄的英文譯本明藏目錄作根據所收的經典已佔四千多號了因為這部目錄偏重於大藏裏的經典用經律論三大部的次序故原編的號碼須全部重編過了在目錄裏就改編作了翟理斯先生雖然得到了我的神會和尚遺集和石井影印的燉煌出土神會錄兩書均列在目錄尾頁的參考書目裏但他並沒有認出這個殘卷子是神會的語錄故號的記錄只說佛家教義的問答不完好寫本我很佩服京都大學的學人的共同調查的研究班的合作精神他們肯費大工夫將全部寫本翻覆審核前後已有三次所以入矢義高先生能在三年前一九五七發見這個第三本神會語錄這種有組織的同力合作的研究方法最值得我們中國學人效法去年四月底我出醫院後就從歷史語言研究所借出影印本和入矢先生在幾次通信裏提到的有關神會的其他各卷子的影印本作一番初步的校勘七月初我出國了沒有能够寫定這個不欠頭的第三本神會語錄在今年二月裏我用胡本和石井本比勘這個卷子又參校了我從前校寫的菩提達摩南宗定是非論胡適神會和尚遺集一五九一六七頁又一七五一八六頁又史語所集刊廿九本八三八八五七頁以下省稱定是非論才知道這個倫敦卷子除了首十六行又五個字之外完全與石井本相同而與胡本也有大部分相同包括石井所無的第一章的前一段其中胡本所無的小部分第九章與第十四章都見於定是非論這樣校勘之後我決定把這個倫敦卷子校寫作神會和尚語錄的第三個敦煌寫本分寫作十四章連卷首殘存的劉澄序共成十五大段胡適本的目錄是分章的共分五十章其中第六至第四十九章大致等於石井本的第一至第四十四章第四十多章兩本有小出入如石井本第九章第十四章第三十四章第四十章胡本皆無故只能說大致相等胡本前面有五章包括荷澤和尚與拓拔開府書後面有康圓智問的很長一章是石井本所無康圓智問章之末有一行云因汝所問一切修道者同悟這顯然是全部語錄的結尾了胡本的底本巴黎在這下面緊接菩提達摩南宗定是非論並序獨孤沛撰可見胡本語錄雖然欠頭並不缺尾原是到康圓智問一章頁一四八一五二就結束了這是神會語錄第一本的原本形態石井本雖說是欠頭但這個寫本是一個完整的長卷總共五百零七行首尾都有空白的紙是一個首尾完整無缺的精美唐寫本此本後幅有題記兩行墨色很淡是禿筆寫的唐貞元八年歲在未貞元七年辛未七九一八年壬申歲不在未沙門寶珍共判官趙秀琳秀字鈴木校寫作看字於北庭奉張大夫處分命勘訖其年冬十月廿二日記石井本鈔寫在貞元七八年七九一七九二校勘之前其時去神會之死寶應元年七六二不過三十年他的語錄已傳到天山之北的北庭都護府在今新疆孚遠縣了此本到如今已一千一百六十九年了還保存原來首尾完整的狀態前面空幅有題記一行此文字欠頭後有博覽道人尋本續之矣所謂欠頭只是說此文字沒有標題可能前面還有缺失的部分但我們現在看見倫敦的第三本可以知道石井本的第一章正是倫敦本的第一章差不多緊接在劉澄的序文之後這就可見這個石井本原來並不欠頭可能只是原來有意刪去了劉澄的原序又有意刪去了劉澄原擬的南陽和尚問答雜徵義的標題所以就好像欠頭了這是神會語錄第二本即石井本的原來形態為什麼這本子刪去了劉澄的原序呢因為這本子後面鈴木校石井本的第四十九章以下有了新加的六代大德是誰並敘傳授所由的兩千五百多字又有了新加的大乘頓教頌並序這篇大乘頓教序是一篇我荷澤和上的小傳裏面已說他付心契於一人傳法燈於六祖慈悲心廣汲引情深明示醉人之珠頓開貧女之藏墮疑網者斷之以慧劍溺迷津者濟之以智舟於是省閣簪裾里閈耆耋得無所得聞所未聞疑達摩之再生謂優曇之一現有了這樣一篇新傳序所以用不着保存劉澄那篇笨拙的舊序了為什麼要刪去南陽和尚問答雜徵義的舊題呢天寶四年七四五以後神會奉召到東京荷澤寺荷字讀去聲是負荷的荷長安的荷恩寺洛陽的荷澤寺是同時立的南陽和尚已成了荷澤和尚了問答雜徵義的標題也不是一個很醒目的題名故也有改題的必要日本入唐求法的圓仁的開成三年八三八目錄裏還題南陽和尚問答雜徵義的原名稍後入唐的圓珍的大中八年八五四十一年八五七目錄及大中十二年八五八的總目錄裏就都改題作南宗荷澤禪師問答雜徵了圓珍此三錄裏又都記有荷澤和尚禪要一卷我相信荷澤和尚禪要可能就是這部神會語錄新改的標題其內容可能是和這個石井本完全一樣的我這個假設將來也許有得到證實或否證的一天我現在可以依據這三個神會語錄的寫本的內容同異假定這三本結集的先後次序大致如下最早結集本原題南陽和尚問答雜徵義有前唐山主簿劉澄序其前面的十五段大概近於倫敦藏的寫本其後半部直到結尾可能大概近於胡適本的後半部這個本子的結集是在開元二十年七三二神會在滑臺大雲寺為天下學道者辨其是非為天下學道者定其宗旨之後故此本裏採取了南宗定是非論的一小部份材料神會晚年的修訂本這個本子大致近于胡適本其標題可能已改為南宗荷澤禪師問答雜徵了胡本前面新加的材料之中有荷澤和尚與拓拔開府書是一件重要的文字此書稱荷澤和尚故知修訂已在神會晚年此本最末是康圓智問的一章用因汝所問一切修道者同悟一句作結尾顯然沒有殘缺其下緊接定是非論的首幅更可知語錄雖有增修還沒有加上六代大德的略傳也還沒有換上那位不知名作者的大乘頓教頌並序因為後幅沒有這篇頌並序故我推想此本前面可能還保存了劉澄的原序此本前面有新加的材料但中間也有刪去的材料如倫敦本與石井同有的第九與第十四章都是從定是非論鈔入的都被刪去了胡本殘存的第一章顯然也是從定是非論鈔來的那可能又是修訂之後增添的了據定是非論的獨孤沛序定是非論有開元十八十九二十年幾種不定的本子後有師資血脈傳亦在世流行語錄的修訂本好像是要把這三部書分的清楚使他們不互相重複神會死後的增訂本這個本子的全部大概近于石井本的全部前面沒有劉澄序而後面有六代大德的略傳又有大乘頓教頌並序中間也有增入的材料如石井本的第三十四章三十九章四十五章四十六章都是胡本沒有的又第四十七章四十八章是從定是非論鈔出的第四十九章以下敘六代大德的兩千五六百字可能是從神會的師資血脈傳鈔來的師資血脈傳原是單行的這個增訂本好像把他鈔作語錄的一部分了胡本把定是非論的幾章剔出來而此本把那幾章併進去這是一不同胡本顯然沒有採用師資血脈傳而此本充分收入六代大德的師資傳授這是二不同胡本沒有後序而此本最後有大乘頓教頌序其實是駢文的神會小傳這是三不同細看此傳中說神會在幼稚科遊方訪道所遇諸山大德問以湼槃本寂之義皆久而不對心甚異之詣嶺南復遇漕溪尊者作禮未訖已悟師言這就接近後來傳說有一童子名神會年十三自玉泉來參禮能大師通行本六祖壇經八的話了神會請王維作能大師碑文其中明說弟子曰神會遇師於晚景聞道於中年唐文粹六十三宋高僧傳的神會傳也說他從師傳授五經克通幽賾次尋莊老靈府廓然由是於釋教留神乃無仕進之意辭親於本府襄陽府國昌寺顥元法師下出家其諷誦群經易如反掌全大律儀匪貪講貫這都不是一個在幼稚科的童子的行徑所以我說這個增訂本石井本的語錄是神會死後有人增訂的石井本首尾都有空白但首尾都無標題可能是這個增訂本的底本還沒有決定新題名的時候就傳鈔流行了石井本不是底本