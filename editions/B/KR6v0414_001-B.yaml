裏寶難尋運保躭麻者為報擔麻者如我不重金如何不重金民國四十九年四月五日補寫七校寫五更轉後記許國霖敦煌雜錄裏還有一首五更調周字七十號顯然也是五更轉的調子其文字和劉復敦煌掇瑣三八巴黎題作南宗讚一本的相同可以互相校勘倫敦也有一塊殘紙編只存七行也是這一首五更轉的一更二更我現在合校這兩本把這第三首五更轉寫定如下五更調劉復本題南宗讚一更長如來智慧心劉作化中藏不知自身本是佛無明障蔽許作閉自荒忙了五許作王蘊躰許作聽皆亡滅六識不相當行住坐許脫坐字臥常作劉作住意則知四大是佛堂二更長有為功德劉脫為功二字盡無常世間造作應不久劉作及無為法會躰劉作聽皆亡入聖位劉作使坐金剛諸劉作詣佛國遍許作變十方但知十方元是一劉作但諸世界願貫一決定得入諸劉作於佛行三更嚴坐禪執定甚能甜不信劉作宣諸天甘露蜜魔作摩劉作願君眷屬許作卷屢出來看諸佛教實許作是福田持齋戒得生天生天終劉作中歸還墮落努力迴心趣涅槃劉脫力字趣許作取四更蘭許作難法身體性本來禪凡夫不念生分別輪迴六趣許作住心不安求佛性向裏看有佛衣劉作了佛意不覺寒廣大刼來常不悟許脫不字今生作意斷慳貪五更延劉脫延字菩提種子坐紅許作苧蓮煩惱泥許作寧中常不染恒將淨土共金顏許作連佛在世八十年許作連般若意不在言夜夜朝朝劉作花花朝朝許作夜了照了恒念經當初求覓一連全劉作一年川更不可通劉復先生鈔的巴黎本雖然題作南宗讚我看這支曲子決不是神會作的第一更曲有行住坐臥常作意一句正和神會莫作意的思想相反就是一個反證這曲子裏的思想很平凡文字也很俗氣很可能是後來的和尚套神會的南宗定邪正五更轉做的曲子居然也在敦煌石室裏留下了兩三個鈔本我們看敦煌出來的三隻五更轉的曲調是完全相同的都是從七字句變化出來的長短句第一句第五六七八句都是三字句第二三四九十句都是七字句三首共十五章用韻的方式也完全相同我在這裏要指出這三首五更轉就是填詞的最好的歷史例證神會的年代是可考的他生在唐高宗咸亨元年六七死在唐肅宗廢除年號的元年即是寶應元年七六二他的活動時期正當玄宗的開元天寶時代七一三七五五正是所謂盛唐的時代我們可以說現在有敦煌出來的荷澤寺神會和尚五更轉兩首做實物的證據我們可以推知開元天寶時代確然已有依現成的曲拍作曲詞的風氣了確然已有後人所謂填詞的風氣了在民國十四年一九二五我寫了一篇詞的起原我的結論是長短句的詞調起於中唐白居易作憶江南的長短句劉禹錫依此曲拍作春去也詞題云和樂天春詞依憶江南曲拍為句這是填詞的先例白居易的憶江南是這樣的江南好風景舊曾諳日出江花紅勝火春來江水綠如藍能不憶江南劉禹錫的春詞是這樣的春去也多謝洛城人弱柳從風疑舉袂叢蘭挹露似霑巾獨坐亦含顰這確是依憶江南曲拍為句所以我說這是填詞的先例當時我曾指出尊前集收的李白詞十二首全唐詩收的李白詞十四首其中多有很晚出的作品其中長短句如憶秦娥菩薩蠻清平樂都是後起的曲調我的看法是向來只是詩人做詩而樂工譜曲中唐以後始有教坊作曲而詩人填詞例如王維的西出陽關無故人本是一首整齊的七言絕句經過樂工譜曲就成了當時最感人的送別曲子了到了白居易劉禹錫的依憶江南曲拍為句那才是教坊作曲而詩人填詞了那才是長短句的詞的起原當時我曾把詞的起原初稿送給王國維先生請他指教王先生答書說尊說謂長短句不起於盛唐以詞人方面言之弟無異議若就樂工方面言之則教坊實早有此種曲調菩薩蠻之屬崔令欽教坊記可證也我當時因為教坊記的三百多曲調之中有天仙子傾盃樂菩薩蠻望江南等曲都是中唐才有的曲調見於各種記載所以我頗疑心那張曲名表可能有後人隨時添入的新調不可用來考證盛唐開元天寶時代有無某種曲調參看胡適詞選附錄的詞的起原那是三十五年前的討論那位可敬愛的王國維先生已死了三十三年了現在我們看敦煌寫本裏鈔出的各種佛曲特別看那流傳最廣的神會和尚的五更轉曲子我們不但可以相信開元天寶時代已有依照當時最流行的曲拍作佛曲的風氣我們並且可以相信那樣填詞作曲的風氣可能比開元天寶還更早可能是人們歌唱的普通作風並不限於教坊的樂工也不限於歌妓舞女也不限於佛教的和尚尼姑凡是好聽的曲子凡是許多人愛聽愛唱的調子總有人依照那曲調編造新曲那就是填詞了敦煌出來的五更轉曲子有簡單的四句調有繁複的十句調神會的五更轉是那繁複的十句調其形式似是雙調即是叠調可以寫成這個樣子一更初妄想真如不異居迷則真如是妄想悟則妄想是真如念不起更無餘見本性等空虛有作有求非解脫無作無求是功夫劉復的敦煌掇瑣二七鈔了巴黎的敦煌寫本的五更調艶曲我們可鈔一更曲作例一更初夜坐調琴欲奏相思傷妾心每恨狂夫薄行跡一過拋人年月深君自去來餘幾春不傳書信絕知聞願妾變作天邊鴈萬里悲鳴尋訪君從這種整齊的七字句變到長短不齊的三字句和七字句是曲調的演變從單調的小令變到雙調也是曲調的演變從歌唱男女愛情或閨怨的情歌變到宣傳佛教故事或佛教信仰的佛曲那就是改換內容的填詞作曲了神會的南宗定邪正五更轉使我們知道盛唐時代已有人用雙調的五更轉來做宣傳南宗新教義的曲子了敦煌出來的一些單調的五更轉佛曲或俗典可能比神會的雙調曲子更早但我們不能考定他們的年代了我們看見的敦煌本單調五更轉有這許多件倫敦的維摩五更轉倫敦的無相五更轉巴黎的太子五更轉劉復敦煌掇瑣三六羅振玉鈔的歎五更敦煌零拾五此中的太子五更轉是用這曲調來唱太子出家的故事其二更曲是二更深五百個力士睡昏沉遮取黃羊及車匿朱鬃白馬同一心維摩無相兩首五更轉都是宣傳教義的可引無相五更轉的二更曲作例二更深菩提妙理誓探尋曠徹清虛無去住證得如如平等心羅振玉鈔的歎五更是勸人讀書的曲子我們也引二更曲作例二更深孝經一卷不曾尋之乎者也都不識如今嗟歎始悲吟這都是用人人能哼能唱的調子來填詞作曲目的是用曲子作宣傳我們看了敦煌出來的許多佛曲我們不能不承認這些宣傳佛教的曲子實在沒有文學技術也沒有高明的思想內容所以都沒有文學的價值他們的宣傳作用似乎是音樂成分比文學成分佔的多他們全靠那些人人能唱的曲調來引動許多男女聽眾文字的不通內容的淺薄都是不關重要的填詞作曲的風氣可以早到盛唐或早到盛唐以前那是我寫詞的起原時沒有想到的填詞作曲來做宗教的宣傳這也是我當年沒有想到的我當年曾說我疑心依曲拍作長短句的歌詞這個風氣是起於民間起於樂工歌妓劉禹錫白居易溫庭筠一班人嫌倡家的歌詞不雅於是也依樣改作長短句的新詞歐陽炯序花間集云自南朝之宮體扇北里之倡風何止言之不文所謂秀而不實這是文人不滿意於倡家的歌詞的明白表示所以我們可以說唐五代的文人填詞大概是不滿意於倡家已有的長短句歌詞依其曲拍仿長短句的體裁作為新詞到了後來文人能填詞的漸漸多了教坊倡家每得新調也就逕請文人填詞例如柳永善為歌辭教坊樂工每得新腔必求永為辭始行於世這個結論大致還是可以成立的從盛唐以下儘管有一些和尚用最流行的民歌曲調來製作佛曲但因為那些作宗教宣傳的佛曲實在沒有文學價值正如那許多倡家歌妓唱的歌曲雖然音律不差而下語用字全不可讀此用沈義父樂府指迷的話也沒有文學價值所以詞的時代不能起于盛唐只能起于白居易劉禹錫之後必須到了溫庭筠韋莊李後主馮延巳的時期方才有文學的詞方才有詞的文學四九四十二夜在南港轉載自中央研究院歷史語言研究所集刊外編第四本
